<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - World Class Curtain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" href="logoo.png" type="image/png">

    <!-- Supabase Client Setup -->
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js'
        const SUPABASE_URL = 'https://xyvqvcfdkvvbagqxygwo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnF2Y2Zka3Z2YmFncXh5Z3dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc3NTAzMjUsImV4cCI6MjA3MzMyNjMyNX0.y9mp2CwTpmBfeu03iQx_2khV2F3SD_xhFTih3WMoMMA';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        window.supabase = supabase; // Make it globally accessible
    </script>

    <script>
        // Tailwind Customization to match index.html
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'playfair': ['"Playfair Display"', 'serif'],
                        'poppins': ['Poppins', 'sans-serif']
                    },
                    colors: {
                        'primary': '#1a1b4b',
                        'secondary': '#e6f3ff'
                    }
                }
            }
        };
    </script>
</head>
<body class="font-poppins bg-secondary flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-white py-4 px-6 md:px-12 shadow-md">
        <div class="container mx-auto">
            <a href="index.html" class="flex items-center text-2xl font-playfair font-bold text-primary">
                <img src="logoo.png" alt="World Class Curtain Logo" class="h-10 mr-2">
                <span>World Class Curtain</span>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
            
            <!-- Tab Navigation -->
            <div class="flex border-b border-gray-200 mb-6">
                <button id="tab-signin" class="flex-1 py-2 font-semibold text-primary border-b-2 border-primary">Sign In</button>
                <button id="tab-signup" class="flex-1 py-2 font-semibold text-gray-500">Sign Up</button>
            </div>

            <!-- Error Message Display -->
            <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-md mb-4" role="alert"></div>
            <!-- Success Message Display -->
             <div id="success-message" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-md mb-4" role="alert"></div>

            <!-- Sign In Form -->
            <form id="signin-form">
                <div class="mb-4">
                    <label for="signin-email" class="block text-gray-700 font-medium mb-2">Email Address</label>
                    <input type="email" id="signin-email" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" required />
                </div>
                <div class="mb-6">
                    <label for="signin-password" class="block text-gray-700 font-medium mb-2">Password</label>
                    <input type="password" id="signin-password" class="w-full p-3 border border-gray-300 rounded-md" required />
                </div>
                <button type="submit" class="w-full bg-primary text-white py-3 rounded-md hover:bg-opacity-90 font-semibold transition-all duration-300">Sign In</button>
            </form>

            <!-- Sign Up Form -->
            <form id="signup-form" class="hidden">
                <div class="mb-4">
                    <label for="signup-email" class="block text-gray-700 font-medium mb-2">Email Address</label>
                    <input type="email" id="signup-email" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" required />
                </div>
                <div class="mb-4">
                    <label for="signup-password" class="block text-gray-700 font-medium mb-2">Password</label>
                    <input type="password" id="signup-password" class="w-full p-3 border border-gray-300 rounded-md" placeholder="At least 6 characters" required />
                </div>
                <button type="submit" class="w-full bg-primary text-white py-3 rounded-md hover:bg-opacity-90 font-semibold transition-all duration-300">Create Account</button>
            </form>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-primary text-white py-8 text-center mt-auto">
        <p>&copy; 2025 World Class Curtain. All rights reserved.</p>
    </footer>

    <!-- Form Logic Script -->
    <script type="module">
        const supabase = window.supabase;

        // DOM Elements
        const tabSignin = document.getElementById('tab-signin');
        const tabSignup = document.getElementById('tab-signup');
        const signinForm = document.getElementById('signin-form');
        const signupForm = document.getElementById('signup-form');
        const errorMessageDiv = document.getElementById('error-message');
        const successMessageDiv = document.getElementById('success-message');

        function showMessage(message, type = 'error') {
            const div = type === 'error' ? errorMessageDiv : successMessageDiv;
            const otherDiv = type === 'error' ? successMessageDiv : errorMessageDiv;
            
            div.textContent = message;
            div.classList.remove('hidden');
            otherDiv.classList.add('hidden');
        }

        // Tab switching logic
        tabSignin.addEventListener('click', () => {
            signinForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            tabSignin.classList.add('text-primary', 'border-primary');
            tabSignup.classList.remove('text-primary', 'border-primary');
            errorMessageDiv.classList.add('hidden');
            successMessageDiv.classList.add('hidden');
        });

        tabSignup.addEventListener('click', () => {
            signupForm.classList.remove('hidden');
            signinForm.classList.add('hidden');
            tabSignup.classList.add('text-primary', 'border-primary');
            tabSignin.classList.remove('text-primary', 'border-primary');
            errorMessageDiv.classList.add('hidden');
            successMessageDiv.classList.add('hidden');
        });
        
        // Sign In Handler
        signinForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;
            
            const { error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                showMessage(`Login Failed: ${error.message}`);
            } else {
                showMessage('Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            }
        });

        // Sign Up Handler
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            const { data, error } = await supabase.auth.signUp({ email, password });
            
            if (error) {
                showMessage(`Sign Up Failed: ${error.message}`);
            } else {
                // Supabase sends a confirmation email. After signup, the user is technically logged in.
                showMessage('Account created! Redirecting to the homepage...', 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            }
        });
    </script>
</body>
</html>
